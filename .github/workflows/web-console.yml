name: Nova Quality

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "web-console/**"
      - "package.json"
      - "tsconfig.json"
      - ".github/workflows/web-console.yml"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "web-console/**"
      - "package.json"
      - "tsconfig.json"
      - ".github/workflows/web-console.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.15.0"
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Lint core
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build core
        run: npm run build

      - name: Build web console
        run: npm run ui:build
