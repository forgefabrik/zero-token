name: Deployment Check

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "deploy/bkg/**"
      - ".github/workflows/deployment-check.yml"
  pull_request:
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "deploy/bkg/**"
      - ".github/workflows/deployment-check.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Validate first-start admin generation
        run: |
          rm -f deploy/bkg/state/admin.data deploy/bkg/state/caddy.env
          docker run --rm \
            -e NOVA_DOMAIN=bkg.eysho.info \
            -v "$PWD/deploy/bkg/init-auth.sh:/usr/local/bin/init-auth.sh:ro" \
            -v "$PWD/deploy/bkg/state:/state" \
            --entrypoint /bin/sh \
            caddy:2.8-alpine \
            /usr/local/bin/init-auth.sh
          test -s deploy/bkg/state/admin.data
          test -s deploy/bkg/state/caddy.env
          grep -q '^Domain: https://bkg.eysho.info$' deploy/bkg/state/admin.data
          grep -q '^Login: https://bkg.eysho.info/$' deploy/bkg/state/admin.data
          grep -q '^Remote Browser: https://bkg.eysho.info/remote-browser/$' deploy/bkg/state/admin.data
          if grep -Eq ':3000|:6080|:9222' deploy/bkg/state/admin.data; then
            echo 'admin.data enthält unerlaubte öffentliche Portangaben' >&2
            exit 1
          fi
          rm -f deploy/bkg/state/admin.data deploy/bkg/state/caddy.env

      - name: Build Nova image
        run: docker build --tag nova-bkg:check .

      - name: Build remote browser image
        run: docker build --tag nova-remote-browser:check deploy/bkg/remote-browser

      - name: Validate Compose
        run: docker compose -f deploy/bkg/compose.yaml config >/dev/null

      - name: Validate Caddyfile
        run: |
          HASH="$(docker run --rm caddy:2.8-alpine caddy hash-password --plaintext validation)"
          docker run --rm \
            -e ACME_EMAIL=validation@example.invalid \
            -e NOVA_WEB_USER=nova \
            -e NOVA_WEB_PASSWORD_HASH="$HASH" \
            -v "$PWD/deploy/bkg/Caddyfile:/etc/caddy/Caddyfile:ro" \
            caddy:2.8-alpine \
            caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile
