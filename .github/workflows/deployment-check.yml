name: Deployment and Core Check

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "deploy/bkg/**"
      - "scripts/**"
      - "src/**"
      - "tests/**"
      - "web-console/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - ".github/workflows/deployment-check.yml"
  pull_request:
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "deploy/bkg/**"
      - "scripts/**"
      - "src/**"
      - "tests/**"
      - "web-console/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - ".github/workflows/deployment-check.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build core
        run: npm run build

      - name: Build web console
        run: npm run ui:build

      - name: Validate first-start state generation
        run: |
          STATE_DIR="$RUNNER_TEMP/nova-first-start"
          mkdir -p "$STATE_DIR"
          docker run --rm \
            -e NOVA_DOMAIN=bkg.eysho.info \
            -v "$PWD/deploy/bkg/init-auth.sh:/usr/local/bin/init-auth.sh:ro" \
            -v "$PWD/deploy/bkg/init-api-key.sh:/usr/local/bin/init-api-key.sh:ro" \
            -v "$STATE_DIR:/state" \
            --entrypoint /bin/sh \
            caddy:2.8-alpine \
            -c '/bin/sh /usr/local/bin/init-auth.sh && /bin/sh /usr/local/bin/init-api-key.sh'
          test -s "$STATE_DIR/admin.data"
          test -s "$STATE_DIR/caddy.env"
          test -s "$STATE_DIR/api.key"
          grep -q '^Domain: https://bkg.eysho.info$' "$STATE_DIR/admin.data"
          grep -q '^Login: https://bkg.eysho.info/$' "$STATE_DIR/admin.data"
          grep -q '^Remote Browser: https://bkg.eysho.info/remote-browser/$' "$STATE_DIR/admin.data"
          grep -Eq '^nova_[a-f0-9]{64}$' "$STATE_DIR/api.key"
          if grep -Eq ':3000|:6080|:9222' "$STATE_DIR/admin.data"; then
            echo 'admin.data enthält unerlaubte öffentliche Portangaben' >&2
            exit 1
          fi

      - name: Build Nova image
        run: docker build --tag nova-bkg:check .

      - name: Build remote browser image
        run: docker build --tag nova-remote-browser:check deploy/bkg/remote-browser

      - name: Validate Compose
        run: docker compose -f deploy/bkg/compose.yaml config >/dev/null

      - name: Validate Caddyfile
        run: |
          HASH="$(docker run --rm caddy:2.8-alpine caddy hash-password --plaintext validation)"
          docker run --rm \
            -e ACME_EMAIL=validation@example.invalid \
            -e NOVA_WEB_USER=nova \
            -e NOVA_WEB_PASSWORD_HASH="$HASH" \
            -v "$PWD/deploy/bkg/Caddyfile:/etc/caddy/Caddyfile:ro" \
            caddy:2.8-alpine \
            caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile
