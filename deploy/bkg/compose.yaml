name: nova-bkg

services:
  auth-init:
    image: caddy:2.8-alpine
    restart: "no"
    working_dir: /
    environment:
      NOVA_DOMAIN: bkg.eysho.info
      NOVA_STATE_DIR: /state
      NOVA_HOST_UID: ${NOVA_HOST_UID:-1000}
      NOVA_HOST_GID: ${NOVA_HOST_GID:-1000}
      NOVA_RUNTIME_GID: "10001"
    entrypoint:
      - /bin/sh
      - -c
      - /bin/sh /usr/local/bin/init-auth.sh && /bin/sh /usr/local/bin/init-api-key.sh
    volumes:
      - ./init-auth.sh:/usr/local/bin/init-auth.sh:ro
      - ./init-api-key.sh:/usr/local/bin/init-api-key.sh:ro
      - ./state:/state

  nova:
    build:
      context: ../..
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NOVA_HOME: /data
      NOVA_CDP_URL: http://172.30.250.10:9222
      NOVA_REMOTE_LOGIN_VIEW_URL: https://bkg.eysho.info/remote-browser/vnc.html?autoconnect=true&resize=remote&path=remote-browser/websockify
      NOVA_PUBLIC_BASE_URL: https://bkg.eysho.info
      NOVA_API_KEY_FILE: /run/nova-state/api.key
      ZT_LOG_LEVEL: ${NOVA_LOG_LEVEL:-info}
    command:
      - node
      - dist/index.js
      - start
      - --host
      - 0.0.0.0
      - --port
      - "3000"
    volumes:
      - nova_data:/data
      - ./state:/run/nova-state:ro
    expose:
      - "3000"
    depends_on:
      auth-init:
        condition: service_completed_successfully
      remote-browser:
        condition: service_healthy
    networks:
      - private

  remote-browser:
    build:
      context: ./remote-browser
      dockerfile: Dockerfile
    restart: unless-stopped
    shm_size: 1gb
    environment:
      NOVA_BROWSER_WIDTH: ${NOVA_BROWSER_WIDTH:-1280}
      NOVA_BROWSER_HEIGHT: ${NOVA_BROWSER_HEIGHT:-900}
    volumes:
      - remote_browser_data:/data
    expose:
      - "6080"
      - "9222"
    networks:
      private:
        ipv4_address: 172.30.250.10

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      auth-init:
        condition: service_completed_successfully
      nova:
        condition: service_healthy
    environment:
      ACME_EMAIL: ${ACME_EMAIL:-admin@eysho.info}
    entrypoint:
      - /bin/sh
      - /usr/local/bin/caddy-entrypoint.sh
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy-entrypoint.sh:/usr/local/bin/caddy-entrypoint.sh:ro
      - ./state:/state:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - private

networks:
  private:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.250.0/24

volumes:
  nova_data:
  remote_browser_data:
  caddy_data:
  caddy_config:
